<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayela's Food | Registros</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@400&display=swap" rel="stylesheet">
    <style>
        :root { --madera: #3d2b1f; --oro: #a67c52; }
        body { font-family: 'Poppins', sans-serif; background-color: #f4ece2; padding: 20px; }
        .container { max-width: 950px; margin: 0 auto; background: white; padding: 30px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 8px solid var(--madera); }
        .nav-fecha { display: flex; justify-content: space-between; align-items: center; background: #fdfaf7; padding: 15px; border-radius: 5px; margin-bottom: 20px; border: 1px solid #ddd; }
        .btn-nav { background: var(--madera); color: white; border: none; padding: 10px 15px; cursor: pointer; border-radius: 4px; font-family: 'Playfair Display'; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: var(--madera); color: white; padding: 12px; text-align: left; }
        td { padding: 12px; border-bottom: 1px solid #eee; font-size: 0.9rem; }
        .vacio { text-align: center; padding: 40px; color: #999; font-style: italic; }
    </style>
</head>
<body>
<div class="container">
    <h1 style="font-family: 'Playfair Display'; color: var(--madera); text-align: center;">Historial de Pedidos Cloud</h1>
    <div class="nav-fecha">
        <button class="btn-nav" id="btnPrev">← Día Anterior</button>
        <div id="fecha-actual" style="font-weight:bold; color: var(--madera);">Cargando...</div>
        <button class="btn-nav" id="btnNext">Siguiente Día →</button>
    </div>
    <div id="tabla-area">
        <table id="tabla-pedidos">
            <thead><tr><th>Nombre</th><th>Lugar</th><th>Alimento</th><th>Envío / Dirección</th><th>Notas</th></tr></thead>
            <tbody id="cuerpo-tabla"></tbody>
        </table>
        <div id="msj-vacio" class="vacio" style="display:none;">No hay pedidos para este día.</div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyCEKStEmxEY5bYXVErk7QorY-qFR8uROmM",
        authDomain: "mayelas-d5d03.firebaseapp.com",
        projectId: "mayelas-d5d03",
        storageBucket: "mayelas-d5d03.firebasestorage.app",
        messagingSenderId: "194046067402",
        appId: "1:194046067402:web:22ce3a5d08241840516a33",
        measurementId: "G-KBRG6WGQ5X"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let fechaFiltro = new Date();

    async function cargarPedidos() {
        const displayFecha = fechaFiltro.toLocaleDateString('es-ES', { weekday:'long', day:'numeric', month:'long' });
        document.getElementById('fecha-actual').innerText = displayFecha;
        
        const cuerpo = document.getElementById('cuerpo-tabla');
        cuerpo.innerHTML = "<tr><td colspan='5' align='center'>Buscando en la nube...</td></tr>";

        const inicio = new Date(fechaFiltro.setHours(0,0,0,0));
        const fin = new Date(fechaFiltro.setHours(23,59,59,999));

        try {
            const q = query(collection(db, "pedidos"), 
                      where("fecha", ">=", inicio), 
                      where("fecha", "<=", fin),
                      orderBy("fecha", "desc"));

            const snapshot = await getDocs(q);
            cuerpo.innerHTML = "";
            
            if (snapshot.empty) {
                document.getElementById('msj-vacio').style.display = "block";
                document.getElementById('tabla-pedidos').style.display = "none";
            } else {
                document.getElementById('msj-vacio').style.display = "none";
                document.getElementById('tabla-pedidos').style.display = "table";
                snapshot.forEach(doc => {
                    const p = doc.data();
                    cuerpo.innerHTML += `<tr>
                        <td>${p.nombre}</td>
                        <td>${p.empresa}</td>
                        <td>${p.alimento}<br><small><b>Extra:</b> ${p.extras}</small></td>
                        <td>${p.direccion}</td>
                        <td>${p.recomendaciones}</td>
                    </tr>`;
                });
            }
        } catch (e) {
            cuerpo.innerHTML = "<tr><td colspan='5' style='color:red'>Error al cargar: " + e.message + "</td></tr>";
        }
    }

    document.getElementById('btnPrev').onclick = () => { fechaFiltro.setDate(fechaFiltro.getDate() - 1); cargarPedidos(); };
    document.getElementById('btnNext').onclick = () => { fechaFiltro.setDate(fechaFiltro.getDate() + 1); cargarPedidos(); };

    cargarPedidos();
</script>
</body>
</html>
