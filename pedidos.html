<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayela's Food | Realizar Pedido</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --madera: #3d2b1f;
            --crema: #fdfaf7;
            --oro: #a67c52;
            --blanco: #ffffff;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4ece2;
            margin: 0;
            color: #333;
        }

        header {
            background: var(--madera);
            color: white;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 5px solid var(--oro);
        }

        header h1 {
            font-family: 'Playfair Display', serif;
            margin: 0;
            font-size: 2.5rem;
        }

        .container {
            max-width: 700px;
            margin: 40px auto;
            background: var(--blanco);
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }

        h2 {
            font-family: 'Playfair Display', serif;
            color: var(--madera);
            text-align: center;
            border-bottom: 2px solid var(--oro);
            display: inline-block;
            width: 100%;
            padding-bottom: 10px;
            margin-bottom: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            font-weight: 600;
            color: var(--madera);
            margin-bottom: 8px;
            font-size: 0.9rem;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 4px;
            font-family: 'Poppins', sans-serif;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus, textarea:focus {
            border-color: var(--oro);
            outline: none;
        }

        /* Estilo para las opciones de envío */
        .radio-group {
            display: flex;
            gap: 20px;
            margin-top: 10px;
        }

        .radio-option {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        .radio-option input {
            width: auto;
        }

        /* Cuadros de información dinámica */
        #seccion-direccion, #seccion-retiro {
            display: none;
            margin-top: 20px;
            padding: 20px;
            border-radius: 4px;
            font-size: 0.95rem;
        }

        #seccion-direccion { background-color: #fcf8f3; border-left: 5px solid var(--oro); }
        #seccion-retiro { background-color: #f0f4f8; border-left: 5px solid #2980b9; color: #2c3e50; }

        .btn-mandar {
            width: 100%;
            background: var(--madera);
            color: white;
            padding: 20px;
            border: none;
            border-radius: 4px;
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 30px;
        }

        .btn-mandar:hover {
            background: var(--oro);
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.8rem;
            color: #777;
        }
    </style>
</head>
<body>

    <header>
        <h1>Mayela's Food</h1>
    </header>

    <div class="container">
        <h2>Detalles de su Pedido</h2>
        
        <form id="formPedido" action="registros.html">
            <div class="form-group">
                <label for="nombre">1. Nombre Completo *</label>
                <input type="text" id="nombre" name="nombre" required placeholder="Escriba su nombre">
            </div>

            <div class="form-group">
                <label for="empresa">2. Empresa o lugar donde nos escribe *</label>
                <input type="text" id="empresa" name="empresa" required placeholder="Ej: Banco Central / Residencial X">
            </div>

            <div class="form-group">
                <label for="alimento">3. ¿Qué platillo le gustaría comer hoy? *</label>
                <textarea id="alimento" name="alimento" rows="2" required placeholder="Describa el platillo..."></textarea>
            </div>

            <div class="form-group">
                <label for="extras">4. ¿Desea algún extra? *</label>
                <input type="text" id="extras" name="extras" required placeholder="Ej: Bebida, postre, doble porción...">
            </div>

            <div class="form-group">
                <label>5. ¿Desea que se lo lleguemos a dejar? *</label>
                <div class="radio-group">
                    <label class="radio-option">
                        <input type="radio" name="envio" value="si" onclick="mostrarOpcionEnvio('si')" required> Sí
                    </label>
                    <label class="radio-option">
                        <input type="radio" name="envio" value="no" onclick="mostrarOpcionEnvio('no')" required> No (Retiro local)
                    </label>
                </div>

                <div id="seccion-direccion">
                    <label for="direccion">Por favor, escriba su dirección exacta:</label>
                    <textarea id="direccion" name="direccion" rows="3" placeholder="Calle, número de casa, puntos de referencia..."></textarea>
                </div>

                <div id="seccion-retiro">
                    <strong>Punto de retiro:</strong><br>
                    Nuestra dirección es: Detrás del banco de formentacion para que realice el retiro de su comida.
                </div>
            </div>

            <div class="form-group">
                <label for="recomendaciones">6. Recomendaciones o notas adicionales *</label>
                <textarea id="recomendaciones" name="recomendaciones" rows="2" required placeholder="Ej: Sin cebolla, llamar al llegar..."></textarea>
            </div>

            <button type="submit" class="btn-mandar">Mandar Pedido</button>
        </form>
    </div>

    <footer>
        &copy; 2026 Mayela's Food - Tradición Hogareña
    </footer>

    <script>
        function mostrarOpcionEnvio(opcion) {
            const seccionDireccion = document.getElementById('seccion-direccion');
            const seccionRetiro = document.getElementById('seccion-retiro');
            const inputDireccion = document.getElementById('direccion');

            if (opcion === 'si') {
                seccionDireccion.style.display = 'block';
                seccionRetiro.style.display = 'none';
                inputDireccion.setAttribute('required', 'required');
            } else {
                seccionDireccion.style.display = 'none';
                seccionRetiro.style.display = 'block';
                inputDireccion.removeAttribute('required');
            }
        }
    </script>

</body>
</html>
