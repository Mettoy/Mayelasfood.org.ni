<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayela's Food | Pedidos</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --madera: #3d2b1f; --oro: #a67c52; --crema: #fdfaf7; }
        body { font-family: 'Poppins', sans-serif; background-color: #f4ece2; padding: 15px; margin: 0; }
        .container { max-width: 600px; margin: 20px auto; background: white; padding: 25px; border-radius: 8px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); border-top: 6px solid var(--madera); }
        h2 { font-family: 'Playfair Display', serif; color: var(--madera); text-align: center; font-size: 1.6rem; margin-bottom: 25px; }
        .form-group { margin-bottom: 18px; }
        label { display: block; font-weight: 600; color: var(--madera); margin-bottom: 6px; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px; border: 1.5px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: 'Poppins'; font-size: 1rem; }
        .radio-box { display: flex; gap: 20px; padding: 10px 0; }
        #info-envio, #info-retiro { display: none; margin-top: 10px; padding: 15px; border-radius: 4px; background: var(--crema); border-left: 4px solid var(--oro); font-size: 0.85rem; }
        .btn-mandar { width: 100%; background: var(--madera); color: white; padding: 16px; border: none; cursor: pointer; font-family: 'Playfair Display'; font-size: 1.25rem; font-weight: bold; border-radius: 4px; margin-top: 10px; }
        .opcional { color: #999; font-weight: normal; font-size: 0.75rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Detalles de su Pedido</h2>
        <form id="formPedido">
            <div class="form-group"><label>1. Nombre Completo *</label><input type="text" id="nombre" required></div>
            <div class="form-group"><label>2. Empresa o lugar *</label><input type="text" id="empresa" required></div>
            <div class="form-group"><label>3. Platillo deseado *</label><textarea id="alimento" rows="2" required></textarea></div>
            <div class="form-group"><label>4. Extras <span class="opcional">(Opcional)</span></label><input type="text" id="extras"></div>
            
            <div class="form-group">
                <label>5. ¿Desea envío a domicilio? *</label>
                <div class="radio-box">
                    <label><input type="radio" name="envio" value="si" onclick="toggleEnvio('si')" required> Sí</label>
                    <label><input type="radio" name="envio" value="no" onclick="toggleEnvio('no')" required> No</label>
                </div>
                <div id="info-envio"><label>Dirección exacta:</label><textarea id="direccion" rows="2"></textarea></div>
                <div id="info-retiro"><b>Retiro en:</b> Detrás del banco de fomento.</div>
            </div>

            <div class="form-group"><label>6. Recomendaciones <span class="opcional">(Opcional)</span></label><textarea id="recomendaciones" rows="2"></textarea></div>
            <button type="submit" id="btnSubmit" class="btn-mandar">Mandar Pedido</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEKStEmxEY5bYXVErk7QorY-qFR8uROmM",
            authDomain: "mayelas-d5d03.firebaseapp.com",
            projectId: "mayelas-d5d03",
            storageBucket: "mayelas-d5d03.firebasestorage.app",
            messagingSenderId: "194046067402",
            appId: "1:194046067402:web:22ce3a5d08241840516a33",
            measurementId: "G-KBRG6WGQ5X"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.toggleEnvio = (val) => {
            document.getElementById('info-envio').style.display = (val === 'si' ? 'block' : 'none');
            document.getElementById('info-retiro').style.display = (val === 'no' ? 'block' : 'none');
            document.getElementById('direccion').required = (val === 'si');
        };

        document.getElementById('formPedido').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true; btn.innerText = "Enviando...";

            try {
                await addDoc(collection(db, "pedidos"), {
                    nombre: document.getElementById('nombre').value,
                    empresa: document.getElementById('empresa').value,
                    alimento: document.getElementById('alimento').value,
                    extras: document.getElementById('extras').value || "Ninguno",
                    envio: document.querySelector('input[name="envio"]:checked').value,
                    direccion: document.getElementById('direccion').value || "Retiro Local",
                    recomendaciones: document.getElementById('recomendaciones').value || "Sin notas",
                    fecha: serverTimestamp()
                });
                alert("¡Pedido enviado con éxito!");
                window.location.href = 'index.html';
            } catch (error) { alert("Error: " + error.message); btn.disabled = false; }
        });
    </script>
</body>
</html>
