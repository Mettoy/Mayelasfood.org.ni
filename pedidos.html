<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mayela's Food | Realizar Pedido</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root { --madera: #3d2b1f; --oro: #a67c52; --crema: #fdfaf7; }
        body { font-family: 'Poppins', sans-serif; background-color: #f4ece2; padding: 20px; }
        .container { max-width: 650px; margin: 0 auto; background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 8px solid var(--madera); }
        h2 { font-family: 'Playfair Display', serif; color: var(--madera); text-align: center; border-bottom: 2px solid var(--oro); padding-bottom: 15px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: 600; color: var(--madera); margin-bottom: 8px; font-size: 0.9rem; }
        input, textarea { width: 100%; padding: 12px; border: 2px solid #ddd; border-radius: 4px; box-sizing: border-box; font-family: 'Poppins'; }
        #info-envio, #info-retiro { display: none; margin-top: 15px; padding: 15px; border-radius: 4px; border-left: 5px solid var(--oro); background: var(--crema); font-size: 0.9rem; }
        .btn-mandar { width: 100%; background: var(--madera); color: white; padding: 18px; border: none; cursor: pointer; font-family: 'Playfair Display'; font-size: 1.3rem; transition: 0.3s; }
        .btn-mandar:hover { background: var(--oro); }
        .btn-mandar:disabled { background: #ccc; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Detalles del Pedido</h2>
        <form id="formPedido">
            <div class="form-group"><label>1. Nombre Completo *</label><input type="text" id="nombre" required></div>
            <div class="form-group"><label>2. Empresa o lugar *</label><input type="text" id="empresa" required></div>
            <div class="form-group"><label>3. Platillo deseado *</label><textarea id="alimento" required></textarea></div>
            <div class="form-group"><label>4. Extras *</label><input type="text" id="extras" required></div>
            <div class="form-group">
                <label>5. ¿Desea que se lo lleguemos a dejar? *</label>
                <input type="radio" name="envio" value="si" onclick="toggleEnvio('si')" required> Sí 
                <input type="radio" name="envio" value="no" onclick="toggleEnvio('no')" required> No
                <div id="info-envio"><label>Escriba su dirección exacta:</label><textarea id="direccion"></textarea></div>
                <div id="info-retiro">Punto de retiro: Detrás del banco de fomento.</div>
            </div>
            <div class="form-group"><label>6. Recomendaciones *</label><textarea id="recomendaciones" required></textarea></div>
            <button type="submit" id="btnSubmit" class="btn-mandar">Mandar Pedido</button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCEKStEmxEY5bYXVErk7QorY-qFR8uROmM",
            authDomain: "mayelas-d5d03.firebaseapp.com",
            projectId: "mayelas-d5d03",
            storageBucket: "mayelas-d5d03.firebasestorage.app",
            messagingSenderId: "194046067402",
            appId: "1:194046067402:web:22ce3a5d08241840516a33",
            measurementId: "G-KBRG6WGQ5X"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        window.toggleEnvio = (val) => {
            document.getElementById('info-envio').style.display = (val === 'si' ? 'block' : 'none');
            document.getElementById('info-retiro').style.display = (val === 'no' ? 'block' : 'none');
        };

        document.getElementById('formPedido').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            btn.disabled = true;
            btn.innerText = "Procesando...";

            try {
                await addDoc(collection(db, "pedidos"), {
                    nombre: document.getElementById('nombre').value,
                    empresa: document.getElementById('empresa').value,
                    alimento: document.getElementById('alimento').value,
                    extras: document.getElementById('extras').value,
                    envio: document.querySelector('input[name="envio"]:checked').value,
                    direccion: document.getElementById('direccion').value || "Retiro en local",
                    recomendaciones: document.getElementById('recomendaciones').value,
                    fecha: serverTimestamp()
                });
                window.location.href = 'registros.html';
            } catch (error) {
                alert("Error al enviar: " + error.message);
                btn.disabled = false;
                btn.innerText = "Mandar Pedido";
            }
        });
    </script>
</body>
</html>
